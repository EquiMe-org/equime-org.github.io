title: "equiMe — Founder's Journal"
description: "Weekly dispatches on building equiMe. Thought process, execution, culture, and the raw truth of building a company from zero."
url: "https://equime-org.github.io"
baseurl: ""
author:
  name: "Nolen Smith"
  title: "CEO & Founder, equiMe"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Pagination
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
